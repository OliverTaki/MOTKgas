<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOTK SchedView</title>
  <style>
    :root {
      --bg-app: #0e0e10;
      --bg-header: #121214;
      --bg-panel: #17181c;
      --bg-grid: #0f1015;
      --bg-cell: #14161d;
      --border: #2a2d35;
      --text-main: #e5e7eb;
      --text-dim: #9ca3af;
      --accent: #2563eb;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --lane-w: 150px;
      --day-h: 92px;
      --inspector-w: 340px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-app); color: var(--text-main); font-family: sans-serif; }
    #app { height: 100%; display: flex; flex-direction: column; }

    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-header);
      flex-shrink: 0;
    }
    .brand a { color: #fff; text-decoration: none; font-weight: 900; font-size: 13px; }
    .brand span { color: var(--accent); }
    .btn {
      background: #23252d;
      border: 1px solid #3a3e49;
      color: #e5e7eb;
      padding: 5px 10px;
      font-size: 11px;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #323844; }
    .inp {
      background: #0f1218;
      border: 1px solid #3a3e49;
      color: #fff;
      border-radius: 5px;
      font-size: 11px;
      padding: 5px 8px;
    }
    .tag {
      border: 1px solid #323744;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .toolbar-group { position: relative; display: inline-flex; align-items: center; }
    .toolbar-pop {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 260px;
      max-width: min(380px, calc(100vw - 24px));
      max-height: min(70vh, calc(100vh - 70px));
      background: #111216;
      border: 1px solid #2f3138;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
      padding: 8px;
      overflow: auto;
      z-index: 20;
      display: none;
    }
    .toolbar-pop.open { display: block; }
    .toolbar-pop .pop-title { font-size: 10px; color: #9aa1ac; margin-bottom: 8px; }
    .toolbar-pop .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .toolbar-pop .row label { width: 70px; font-size: 10px; color: #a5adba; }
    .lane-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 11px; }
    .lane-row input[type="checkbox"] { accent-color: #38bdf8; }
    #status { font-size: 11px; margin-left: 6px; min-width: 180px; max-width: 38vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #status.saving { color: var(--warn); }
    #status.saved { color: var(--ok); }
    #status.error { color: var(--err); }

    #main { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    #grid-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    #lane-header-scroll {
      height: 36px;
      display: flex;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    #year-corner {
      width: 62px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: #101117;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    #lane-headers { display: flex; }
    .lane-head {
      width: var(--lane-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      font-size: 11px;
      color: #d1d5db;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #grid-scroll { flex: 1; min-height: 0; display: flex; overflow: auto; position: relative; background: var(--bg-grid); }
    #date-axis {
      width: 62px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: #101117;
      position: sticky;
      left: 0;
      z-index: 4;
      min-height: 100%;
    }
    .date-cell {
      height: var(--day-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-dim);
      background: #101117;
    }
    .date-cell.today { background: rgba(37, 99, 235, 0.14); color: #eef2ff; }
    .date-cell .main { font-size: 13px; font-weight: 700; line-height: 1.05; color: #e5e7eb; }
    .date-cell .sub { font-size: 10px; line-height: 1.1; }

    #canvas { position: relative; min-height: 100%; background: var(--bg-grid); }
    .cell {
      position: absolute;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg-cell);
      overflow: hidden;
      padding: 4px;
    }
    .token {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 10px;
      line-height: 1.2;
      padding: 2px 4px;
      background: rgba(37, 99, 235, 0.30);
      color: #e5e7eb;
      min-height: 18px;
      cursor: pointer;
    }
    .token.selected { box-shadow: 0 0 0 1px #67e8f9, inset 0 0 0 1px rgba(255,255,255,0.25); }
    .token.taskless { background: rgba(71, 85, 105, 0.45); }
    .token.status-not_started { background: rgba(29, 78, 216, 0.35); }
    .token.status-in_progress { background: rgba(124, 58, 237, 0.35); }
    .token.status-review { background: rgba(217, 119, 6, 0.35); }
    .token.status-approved { background: rgba(15, 118, 110, 0.35); }
    .token.status-completed { background: rgba(22, 101, 52, 0.35); }
    .tk-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #cbd5e1;
      background: rgba(17, 24, 39, 0.55);
      font-size: 9px;
      font-weight: 700;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .tk-main { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; }
    .tk-arrow { font-size: 10px; color: #c7d2fe; flex-shrink: 0; }
    .token.more { background: rgba(17, 24, 39, 0.55); color: #cbd5e1; justify-content: center; cursor: default; }
    #empty { display: none; padding: 16px; color: #9ca3af; font-size: 12px; }
    #empty.show { display: block; }

    #inspector {
      width: var(--inspector-w);
      flex: 0 0 var(--inspector-w);
      min-width: 280px;
      max-width: 520px;
      background: #15161c;
      display: flex;
      flex-direction: column;
    }
    #insp-head {
      height: 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #insp-content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .inp-group { display: flex; flex-direction: column; gap: 4px; }
    .inp-group label { font-size: 10px; color: #9ca3af; }
    .inp-group input, .inp-group select, .inp-group textarea {
      background: #0f1218;
      border: 1px solid #353a45;
      color: #fff;
      border-radius: 5px;
      font-size: 11px;
      padding: 6px 8px;
      width: 100%;
    }
    .inp-group textarea { min-height: 56px; resize: vertical; }
    .meta { font-size: 10px; color: #8f96a3; }
    .row2 { display: flex; gap: 8px; }
    .row2 > .inp-group { flex: 1; }

    @media (max-width: 1140px) {
      :root { --lane-w: 132px; --day-h: 80px; --inspector-w: 300px; }
      #status { max-width: 28vw; }
      .tag.hide-sm { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="brand"><a id="brand-link" href="#">MOTK <span>SCHEDVIEW</span></a></div>
    <select id="sched-switch" class="inp" style="min-width:150px;"></select>
    <div class="tag hide-sm" id="tag-origin">Origin: -</div>
    <div class="tag hide-sm" id="tag-slot">Slot: -</div>
    <div class="tag hide-sm" id="tag-work">Work: -</div>
    <div class="tag hide-sm" id="tag-tz">TZ: -</div>
    <div style="flex:1;"></div>

    <div class="toolbar-group">
      <button id="btn-view" class="btn" type="button">VIEW</button>
      <div id="view-menu-popup" class="toolbar-pop">
        <div class="pop-title">View</div>
        <div class="row">
          <label for="sv-start-date">Start</label>
          <input id="sv-start-date" class="inp" type="text" placeholder="YYYY-MM-DD">
        </div>
        <div class="row">
          <label for="sv-end-date">End</label>
          <input id="sv-end-date" class="inp" type="text" placeholder="YYYY-MM-DD">
        </div>
        <div class="row">
          <label for="sv-day-count">Days</label>
          <input id="sv-day-count" class="inp" type="number" min="1" max="730" step="1">
        </div>
        <div class="row" style="justify-content:flex-end; margin-top:4px;">
          <button id="btn-view-apply" class="btn" type="button">Apply</button>
          <button id="btn-view-save" class="btn" type="button">Save View</button>
        </div>
      </div>
    </div>

    <div class="toolbar-group">
      <button id="btn-lanes" class="btn" type="button">LANE</button>
      <div id="lane-menu-popup" class="toolbar-pop">
        <div class="pop-title">Lane Visibility</div>
        <div id="lane-menu-list"></div>
        <div class="row" style="justify-content:flex-end; margin-top:4px;">
          <button id="btn-lane-save" class="btn" type="button">Save Lane</button>
        </div>
      </div>
    </div>

    <button id="btn-edit" class="btn" type="button">Edit Mode</button>
    <button id="btn-index" class="btn" type="button">Sched Index</button>
    <button id="btn-reload" class="btn" type="button">Reload</button>
    <div id="status"></div>
  </div>

  <div id="main">
    <div id="grid-wrap">
      <div id="lane-header-scroll">
        <div id="year-corner">----</div>
        <div id="lane-headers"></div>
      </div>
      <div id="grid-scroll">
        <div id="date-axis"></div>
        <div id="canvas"></div>
      </div>
      <div id="empty">No tasks/cards to display in current range.</div>
    </div>
    <div id="inspector">
      <div id="insp-head">INSPECTOR</div>
      <div id="insp-content">Select a token.</div>
    </div>
  </div>
</div>

<script>
window.app = (function() {
  const state = {
    scriptUrl: '',
    schedId: 'sched_0001',
    schedName: 'Schedule',
    allScheds: [],
    viewMeta: {},
    cardViewMeta: {},
    laneVisibility: {},
    tasks: [],
    tasksById: {},
    taskFieldDefs: [],
    cards: [],
    lanes: [],
    config: { originDate: null, slotMin: 30, workHours: 8 },
    dayCount: 14,
    startDate: null,
    selectionTokenId: '',
    cardTasklessOrderMetaKey: 'taskless_order',
    cardTasklessOrderMapKey: 'taskless_card_order',
    loading: false
  };

  const els = {
    brandLink: document.getElementById('brand-link'),
    schedSwitch: document.getElementById('sched-switch'),
    laneHeaders: document.getElementById('lane-headers'),
    yearCorner: document.getElementById('year-corner'),
    dateAxis: document.getElementById('date-axis'),
    canvas: document.getElementById('canvas'),
    gridScroll: document.getElementById('grid-scroll'),
    laneHeaderScroll: document.getElementById('lane-header-scroll'),
    status: document.getElementById('status'),
    empty: document.getElementById('empty'),
    tagOrigin: document.getElementById('tag-origin'),
    tagSlot: document.getElementById('tag-slot'),
    tagWork: document.getElementById('tag-work'),
    tagTz: document.getElementById('tag-tz'),
    viewPopup: document.getElementById('view-menu-popup'),
    lanePopup: document.getElementById('lane-menu-popup'),
    laneMenuList: document.getElementById('lane-menu-list'),
    inpStart: document.getElementById('sv-start-date'),
    inpEnd: document.getElementById('sv-end-date'),
    inpDays: document.getElementById('sv-day-count'),
    inspContent: document.getElementById('insp-content')
  };

  const status = (kind, msg) => {
    if (!els.status) return;
    els.status.className = kind || '';
    els.status.textContent = String(msg || '');
  };
  const norm = (v) => String(v === null || v === undefined ? '' : v).trim();
  const lower = (v) => norm(v).toLowerCase();
  const asNum = (v, fb) => { const n = Number(v); return isFinite(n) ? n : fb; };
  const asInt = (v, min, fb) => { const n = Math.round(Number(v)); return isFinite(n) ? Math.max(min, n) : fb; };
  const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const toYmd = (d) => {
    if (!(d instanceof Date) || isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };
  const toYmdSlash = (d) => toYmd(d).replace(/-/g, '/');
  const parseYmd = (v) => {
    const s = norm(v);
    if (!s) return null;
    const m = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
    if (!m) return null;
    const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), 0, 0, 0, 0);
    return isNaN(d.getTime()) ? null : d;
  };
  const parseDateLoose = (v) => {
    if (v instanceof Date && !isNaN(v.getTime())) return new Date(v.getFullYear(), v.getMonth(), v.getDate(), 0, 0, 0, 0);
    let d = parseYmd(v);
    if (d) return d;
    const x = new Date(v);
    if (!isNaN(x.getTime())) return new Date(x.getFullYear(), x.getMonth(), x.getDate(), 0, 0, 0, 0);
    return null;
  };
  const addDays = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate() + n, 0, 0, 0, 0);
  const dayDiff = (a, b) => Math.floor((new Date(a.getFullYear(), a.getMonth(), a.getDate()) - new Date(b.getFullYear(), b.getMonth(), b.getDate())) / 86400000);
  const weekday = (d) => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  const slotsPerDay = () => {
    const slotMin = Math.max(1, asInt(state.config.slotMin, 1, 30));
    const workMin = Math.max(slotMin, asInt(state.config.workHours, 1, 8) * 60);
    return Math.max(1, Math.round(workMin / slotMin));
  };
  const normalizeStatus = (v) => {
    const s = lower(v).replace(/\s+/g, '_');
    if (!s) return '';
    if (s === 'inprogress') return 'in_progress';
    if (s === 'notstarted') return 'not_started';
    if (s === 'done') return 'completed';
    return s;
  };
  const parseOrder = (v) => {
    const n = Math.round(Number(v));
    return (isFinite(n) && n > 0) ? n : Number.MAX_SAFE_INTEGER;
  };
  const getTaskById = (taskId) => state.tasksById[norm(taskId)] || null;
  const tokenById = (id) => state.cards.find((c) => norm(c.id) === norm(id)) || null;

  const togglePopup = (name) => {
    const openView = (name === 'view');
    const openLane = (name === 'lane');
    if (els.viewPopup) els.viewPopup.classList.toggle('open', openView && !els.viewPopup.classList.contains('open'));
    if (els.lanePopup) els.lanePopup.classList.toggle('open', openLane && !els.lanePopup.classList.contains('open'));
  };
  const closePopups = () => {
    if (els.viewPopup) els.viewPopup.classList.remove('open');
    if (els.lanePopup) els.lanePopup.classList.remove('open');
  };

  const inferKeyByParts = (obj, parts) => {
    if (!obj || typeof obj !== 'object') return '';
    const keys = Object.keys(obj);
    for (let i = 0; i < keys.length; i++) {
      const nk = lower(keys[i]);
      let ok = true;
      for (let p = 0; p < parts.length; p++) if (nk.indexOf(parts[p]) < 0) { ok = false; break; }
      if (ok) return keys[i];
    }
    return '';
  };
  const inferIdKey = (obj, re) => {
    if (!obj || typeof obj !== 'object') return '';
    const keys = Object.keys(obj);
    for (let i = 0; i < keys.length; i++) {
      const v = norm(obj[keys[i]]);
      if (!v) continue;
      if (re && re.test(v)) return keys[i];
    }
    return '';
  };
  const laneLabel = (laneId) => {
    const key = norm(laneId) || 'unassigned';
    const lane = state.lanes.find((l) => norm(l.id) === key);
    return lane ? lane.label : key;
  };
  const dateToStartSlot = (dateLike) => {
    const d = parseDateLoose(dateLike);
    if (!d || !state.config.originDate) return 1;
    const diff = Math.max(0, dayDiff(d, state.config.originDate));
    return diff * slotsPerDay() + 1;
  };
  const dateToEndSlot = (dateLike) => {
    const d = parseDateLoose(dateLike);
    if (!d || !state.config.originDate) return slotsPerDay();
    const diff = Math.max(0, dayDiff(d, state.config.originDate));
    return diff * slotsPerDay() + slotsPerDay();
  };
  const slotToDate = (slot, kind) => {
    const origin = state.config.originDate || new Date();
    const spd = slotsPerDay();
    const safe = Math.max(1, asInt(slot, 1, 1));
    const idx = safe - 1;
    if (kind === 'end') {
      const endIdx = safe;
      const dayOffset = Math.floor(endIdx / spd);
      const inDay = (endIdx % spd) + 1;
      return { date: addDays(origin, dayOffset), slot: inDay };
    }
    const dayOffset = Math.floor(idx / spd);
    const inDay = (idx % spd) + 1;
    return { date: addDays(origin, dayOffset), slot: inDay };
  };

  const normalizeTaskFieldValue = (def, raw) => {
    const type = lower(def && def.type);
    if (type === 'checkbox') {
      if (raw === true || raw === false) return raw;
      const s = lower(raw);
      return s === 'true' || s === '1' || s === 'yes' || s === 'on';
    }
    if (raw === null || raw === undefined) return '';
    return String(raw);
  };

  const initFromPayload = (payload) => {
    state.scriptUrl = norm(payload.scriptUrl || (location.origin + location.pathname));
    state.schedId = norm(payload.schedConfig && payload.schedConfig.activeSchedId) || state.schedId;
    state.schedName = norm(payload.schedConfig && payload.schedConfig.schedName) || state.schedName;
    state.allScheds = Array.isArray(payload.schedConfig && payload.schedConfig.allScheds) ? payload.schedConfig.allScheds : [];
    state.viewMeta = (payload.schedConfig && payload.schedConfig.view_meta && typeof payload.schedConfig.view_meta === 'object')
      ? payload.schedConfig.view_meta : {};
    state.cardViewMeta = (payload.schedConfig && payload.schedConfig.card_view_meta && typeof payload.schedConfig.card_view_meta === 'object')
      ? payload.schedConfig.card_view_meta : {};
    state.cardTasklessOrderMetaKey = norm(payload.cardTasklessOrderMetaKey) || 'taskless_order';
    state.cardTasklessOrderMapKey = norm(payload.cardTasklessOrderMapKey) || 'taskless_card_order';
    state.laneVisibility = (state.viewMeta && typeof state.viewMeta.laneVisibility === 'object' && state.viewMeta.laneVisibility)
      ? Object.assign({}, state.viewMeta.laneVisibility) : {};

    const cfg = payload.config || {};
    state.config.slotMin = Math.max(1, asInt(cfg.slotMin, 1, 30));
    state.config.workHours = Math.max(1, asInt(cfg.workHours, 1, 8));
    state.config.originDate = parseDateLoose(cfg.originDate) || new Date();
    state.config.originDate.setHours(0, 0, 0, 0);

    state.startDate = parseDateLoose(state.viewMeta.startDate) || parseDateLoose(cfg.originDate) || new Date();
    state.startDate.setHours(0, 0, 0, 0);
    state.dayCount = Math.max(1, Math.min(730, asInt(state.viewMeta.dayCount, 1, 14)));

    state.taskFieldDefs = Array.isArray(payload.taskFieldDefs) ? payload.taskFieldDefs.map((d) => ({
      fid: norm(d && d.fid),
      label: norm(d && d.label),
      type: lower(d && d.type),
      editable: !!(d && d.editable),
      options: Array.isArray(d && d.options) ? d.options.slice() : []
    })).filter((d) => !!d.fid) : [];

    const rawTasks = Array.isArray(payload.tasks) ? payload.tasks : [];
    state.tasks = rawTasks.map((t) => {
      const id = norm(t.taskId || t.id);
      const fields = (t && typeof t.fields === 'object' && t.fields) ? t.fields : {};
      return {
        id: id,
        name: norm(t.name),
        status: normalizeStatus(t.status),
        assignee: norm(t.assignee),
        planStart: norm(t.planStartIso || t.planStart),
        planEnd: norm(t.planEndIso || t.planEnd),
        shotCode: norm(t.shotCode),
        taskOrder: norm(t.taskOrder || t.order),
        fields: fields
      };
    }).filter((t) => !!t.id);
    state.tasksById = {};
    state.tasks.forEach((t) => { state.tasksById[t.id] = t; });

    const memberRows = Array.isArray(payload.members) ? payload.members : [];
    const memberNameById = {};
    const lanes = [];
    memberRows.forEach((m) => {
      const idKey = inferIdKey(m, /^pm_/i) || inferKeyByParts(m, ['member', 'id']) || inferKeyByParts(m, ['id']);
      const nameKey = inferKeyByParts(m, ['role']) || inferKeyByParts(m, ['name']);
      const mid = norm(idKey ? m[idKey] : '');
      const label = norm(nameKey ? m[nameKey] : mid);
      if (!mid || memberNameById[mid]) return;
      memberNameById[mid] = label || mid;
      lanes.push({ id: mid, label: memberNameById[mid] });
    });

    const tokens = [];
    state.tasks.forEach((t) => {
      const s = parseDateLoose(t.planStart);
      const e = parseDateLoose(t.planEnd || t.planStart);
      if (!s || !e) return;
      const laneId = norm(t.assignee) || 'unassigned';
      if (!lanes.some((l) => norm(l.id) === laneId) && laneId !== 'unassigned') lanes.push({ id: laneId, label: memberNameById[laneId] || laneId });
      tokens.push({
        id: `task:${t.id}`,
        type: 'task',
        taskId: t.id,
        laneId: laneId,
        start: dateToStartSlot(s),
        end: dateToEndSlot(e),
        status: normalizeStatus(t.status),
        displayId: t.id,
        memo: ''
      });
    });

    const tasklessMap = (state.cardViewMeta && typeof state.cardViewMeta[state.cardTasklessOrderMapKey] === 'object')
      ? state.cardViewMeta[state.cardTasklessOrderMapKey] : {};
    const tasklessCards = Array.isArray(state.cardViewMeta && state.cardViewMeta.taskless_cards) ? state.cardViewMeta.taskless_cards : [];
    if (tasklessCards.length) {
      tasklessCards.forEach((c, idx) => {
        const id = norm(c && c.id) || `taskless:${idx + 1}`;
        const laneId = norm(c && (c.lane || c.laneId)) || 'unassigned';
        if (!lanes.some((l) => norm(l.id) === laneId) && laneId !== 'unassigned') lanes.push({ id: laneId, label: memberNameById[laneId] || laneId });
        const mapOrder = parseOrder(tasklessMap[id]);
        const ownOrder = parseOrder(c && (c.order || c.taskless_order));
        const order = Math.min(mapOrder, ownOrder);
        tokens.push({
          id: `taskless:${id}`,
          type: 'taskless',
          taskId: '',
          laneId: laneId,
          start: Math.max(1, asInt(c && c.start, 1, 1)),
          end: Math.max(1, asInt(c && c.end, 1, Math.max(1, asInt(c && c.start, 1, 1)))),
          displayId: norm(c && c.displayId) || id,
          memo: norm(c && c.memo),
          tasklessOrder: order
        });
      });
    } else {
      const rawCards = Array.isArray(payload.cards) ? payload.cards : [];
      rawCards.forEach((c, idx) => {
        const idKey = inferIdKey(c, /^c_/i);
        const taskKey = inferIdKey(c, /^tk_/i) || inferKeyByParts(c, ['task', 'id']) || inferKeyByParts(c, ['task']);
        const taskId = norm((taskKey ? c[taskKey] : '') || c.taskId || c.taskLink || '');
        if (taskId) return;
        const laneKey = inferKeyByParts(c, ['lane']) || inferKeyByParts(c, ['assignee']) || inferKeyByParts(c, ['member']);
        const cardNoKey = inferKeyByParts(c, ['card', 'number']) || inferKeyByParts(c, ['card', 'no']);
        const startKey = inferKeyByParts(c, ['start', 'slot']) || inferKeyByParts(c, ['start']);
        const endKey = inferKeyByParts(c, ['end', 'slot']) || inferKeyByParts(c, ['end']);
        const memoKey = inferKeyByParts(c, ['memo']) || inferKeyByParts(c, ['note']);
        const cid = norm((idKey ? c[idKey] : '') || c.cardId || c.id || `taskless_fb_${idx + 1}`);
        const laneId = norm((laneKey ? c[laneKey] : '') || c.laneVal || c.lane || 'unassigned') || 'unassigned';
        if (!lanes.some((l) => norm(l.id) === laneId) && laneId !== 'unassigned') lanes.push({ id: laneId, label: memberNameById[laneId] || laneId });
        const mapOrder = parseOrder(tasklessMap[cid]);
        tokens.push({
          id: `taskless:${cid}`,
          type: 'taskless',
          taskId: '',
          laneId: laneId,
          start: Math.max(1, asInt(startKey ? c[startKey] : c.start, 1, 1)),
          end: Math.max(1, asInt(endKey ? c[endKey] : c.end, 1, Math.max(1, asInt(startKey ? c[startKey] : c.start, 1, 1)))),
          displayId: norm((cardNoKey ? c[cardNoKey] : '') || c.displayId || cid),
          memo: norm((memoKey ? c[memoKey] : '') || c.memo || ''),
          tasklessOrder: mapOrder
        });
      });
    }

    if (tokens.some((t) => norm(t.laneId) === 'unassigned') && !lanes.some((l) => norm(l.id) === 'unassigned')) {
      lanes.push({ id: 'unassigned', label: 'Unassigned' });
    }
    state.cards = tokens;
    state.lanes = lanes;

    if (els.brandLink) { els.brandLink.href = state.scriptUrl; els.brandLink.target = '_top'; }
    if (els.tagOrigin) els.tagOrigin.textContent = `Origin: ${toYmdSlash(state.config.originDate)}`;
    if (els.tagSlot) els.tagSlot.textContent = `Slot: ${state.config.slotMin}m`;
    if (els.tagWork) els.tagWork.textContent = `Work: ${state.config.workHours}h`;
    if (els.tagTz) {
      const tz = norm(payload.projectTimezone) || 'UNSET';
      els.tagTz.textContent = `TZ: ${tz}`;
      els.tagTz.style.color = tz === 'UNSET' ? '#f87171' : '';
      els.tagTz.style.borderColor = tz === 'UNSET' ? '#f87171' : '';
    }
  };

  const visibleLanes = () => state.lanes.filter((l) => state.laneVisibility[norm(l.id)] !== false);
  const buildDayVals = () => {
    const out = [];
    for (let i = 0; i < state.dayCount; i++) out.push(addDays(state.startDate, i));
    return out;
  };
  const sortInCell = (a, b) => {
    const ao = a.type === 'task' ? parseOrder((getTaskById(a.taskId) || {}).taskOrder) : parseOrder(a.tasklessOrder);
    const bo = b.type === 'task' ? parseOrder((getTaskById(b.taskId) || {}).taskOrder) : parseOrder(b.tasklessOrder);
    if (ao !== bo) return ao - bo;
    if (a.start !== b.start) return a.start - b.start;
    if (a.end !== b.end) return a.end - b.end;
    return norm(a.id).localeCompare(norm(b.id));
  };

  const renderSchedSwitch = () => {
    if (!els.schedSwitch) return;
    els.schedSwitch.innerHTML = '';
    const list = (state.allScheds && state.allScheds.length) ? state.allScheds : [{ id: state.schedId, name: state.schedName }];
    list.forEach((s) => {
      const id = norm(s && s.id);
      if (!id) return;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = norm(s && s.name) || id;
      if (id === norm(state.schedId)) opt.selected = true;
      els.schedSwitch.appendChild(opt);
    });
  };

  const renderLaneMenu = () => {
    if (!els.laneMenuList) return;
    els.laneMenuList.innerHTML = '';
    state.lanes.forEach((lane) => {
      const id = norm(lane.id);
      const row = document.createElement('div');
      row.className = 'lane-row';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.checked = state.laneVisibility[id] !== false;
      chk.addEventListener('change', () => {
        state.laneVisibility[id] = !!chk.checked;
        render();
      });
      const txt = document.createElement('span');
      txt.textContent = norm(lane.label) || id;
      row.appendChild(chk);
      row.appendChild(txt);
      els.laneMenuList.appendChild(row);
    });
  };

  const renderViewInputs = () => {
    if (els.inpStart) els.inpStart.value = toYmd(state.startDate);
    const end = addDays(state.startDate, Math.max(0, state.dayCount - 1));
    if (els.inpEnd) els.inpEnd.value = toYmd(end);
    if (els.inpDays) els.inpDays.value = String(state.dayCount);
  };

  const renderInspector = () => {
    if (!els.inspContent) return;
    const tok = tokenById(state.selectionTokenId);
    if (!tok) {
      els.inspContent.innerHTML = 'Select a token.';
      return;
    }
    const s = slotToDate(tok.start, 'start');
    const e = slotToDate(tok.end, 'end');
    if (tok.type === 'taskless') {
      els.inspContent.innerHTML = '';
      const block = document.createElement('div');
      block.className = 'inp-group';
      block.innerHTML = `<label>Taskless Card</label><input class="inp" readonly value="${esc(norm(tok.displayId || tok.id))}">`;
      els.inspContent.appendChild(block);
      const g1 = document.createElement('div');
      g1.className = 'row2';
      g1.innerHTML = `<div class="inp-group"><label>Lane</label><input class="inp" readonly value="${esc(laneLabel(tok.laneId))}"></div>` +
        `<div class="inp-group"><label>Order</label><input class="inp" readonly value="${esc(String(parseOrder(tok.tasklessOrder) < Number.MAX_SAFE_INTEGER ? tok.tasklessOrder : '-'))}"></div>`;
      els.inspContent.appendChild(g1);
      const g2 = document.createElement('div');
      g2.className = 'row2';
      g2.innerHTML = `<div class="inp-group"><label>Start</label><input class="inp" readonly value="${esc(toYmdSlash(s.date) + ' / slot ' + s.slot)}"></div>` +
        `<div class="inp-group"><label>End</label><input class="inp" readonly value="${esc(toYmdSlash(e.date) + ' / slot ' + e.slot)}"></div>`;
      els.inspContent.appendChild(g2);
      const memo = document.createElement('div');
      memo.className = 'inp-group';
      memo.innerHTML = `<label>Memo</label><textarea readonly>${esc(tok.memo || '')}</textarea>`;
      els.inspContent.appendChild(memo);
      return;
    }

    const task = getTaskById(tok.taskId);
    if (!task) {
      els.inspContent.innerHTML = '<div class="meta">Task not found.</div>';
      return;
    }

    els.inspContent.innerHTML = '';
    const head = document.createElement('div');
    head.innerHTML =
      `<div class="inp-group"><label>Task ID</label><input readonly value="${esc(task.id)}"></div>` +
      `<div class="inp-group"><label>Task Name</label><input readonly value="${esc(task.name)}"></div>` +
      `<div class="meta">Lane: ${esc(laneLabel(tok.laneId))} / ${esc(toYmdSlash(s.date))} - ${esc(toYmdSlash(e.date))}</div>`;
    els.inspContent.appendChild(head);

    state.taskFieldDefs.forEach((def) => {
      if (!def || !def.fid || !def.editable) return;
      const fid = def.fid;
      const type = lower(def.type);
      const row = document.createElement('div');
      row.className = 'inp-group';
      const label = document.createElement('label');
      label.textContent = def.label || fid;
      row.appendChild(label);
      const rawValue = task.fields && Object.prototype.hasOwnProperty.call(task.fields, fid) ? task.fields[fid] : '';
      const curValue = normalizeTaskFieldValue(def, rawValue);
      let inputEl = null;
      if (type === 'checkbox') {
        inputEl = document.createElement('input');
        inputEl.type = 'checkbox';
        inputEl.checked = !!curValue;
        inputEl.addEventListener('change', () => actions.patchTaskField(task.id, def, inputEl.checked));
      } else if (type === 'select' && Array.isArray(def.options) && def.options.length) {
        inputEl = document.createElement('select');
        def.options.forEach((optVal) => {
          const opt = document.createElement('option');
          opt.value = String(optVal);
          opt.textContent = String(optVal);
          inputEl.appendChild(opt);
        });
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('change', () => actions.patchTaskField(task.id, def, inputEl.value));
      } else if (type === 'text' || type === 'longtext') {
        inputEl = document.createElement('textarea');
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('blur', () => actions.patchTaskField(task.id, def, inputEl.value));
      } else {
        inputEl = document.createElement('input');
        inputEl.type = 'text';
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('blur', () => actions.patchTaskField(task.id, def, inputEl.value));
      }
      row.appendChild(inputEl);
      els.inspContent.appendChild(row);
    });
  };

  const render = () => {
    renderSchedSwitch();
    renderLaneMenu();
    renderViewInputs();

    const lanes = visibleLanes();
    const dayVals = buildDayVals();
    if (!lanes.length || !dayVals.length) {
      if (els.empty) els.empty.classList.add('show');
      if (els.laneHeaders) els.laneHeaders.innerHTML = '';
      if (els.dateAxis) els.dateAxis.innerHTML = '';
      if (els.canvas) els.canvas.innerHTML = '';
      renderInspector();
      return;
    }
    if (els.empty) els.empty.classList.remove('show');

    if (els.yearCorner) els.yearCorner.textContent = String(dayVals[0].getFullYear());
    if (els.laneHeaders) {
      els.laneHeaders.innerHTML = '';
      lanes.forEach((l) => {
        const d = document.createElement('div');
        d.className = 'lane-head';
        d.textContent = norm(l.label) || norm(l.id);
        d.title = d.textContent;
        els.laneHeaders.appendChild(d);
      });
    }
    if (els.dateAxis) {
      const today = toYmd(new Date());
      els.dateAxis.innerHTML = '';
      dayVals.forEach((d) => {
        const n = document.createElement('div');
        n.className = 'date-cell' + (toYmd(d) === today ? ' today' : '');
        n.innerHTML = `<div class="main">${d.getMonth() + 1}/${d.getDate()}</div><div class="sub">(${weekday(d)})</div>`;
        els.dateAxis.appendChild(n);
      });
    }

    const laneW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--lane-w')) || 150;
    const dayH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--day-h')) || 92;
    if (els.canvas) {
      els.canvas.style.width = (lanes.length * laneW) + 'px';
      els.canvas.style.height = (dayVals.length * dayH) + 'px';
      els.canvas.innerHTML = '';
    }

    const bucket = {};
    const keyOf = (laneId, dayIdx) => `${laneId}__${dayIdx}`;
    state.cards.forEach((c) => {
      const laneId = norm(c.laneId) || 'unassigned';
      const sDate = slotToDate(c.start, 'start').date;
      const eDate = slotToDate(c.end, 'end').date;
      for (let di = 0; di < dayVals.length; di++) {
        const d = dayVals[di];
        if (d < sDate || d > eDate) continue;
        const k = keyOf(laneId, di);
        if (!bucket[k]) bucket[k] = [];
        bucket[k].push(c);
      }
    });

    for (let li = 0; li < lanes.length; li++) {
      const lane = lanes[li];
      for (let di = 0; di < dayVals.length; di++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.left = (li * laneW) + 'px';
        cell.style.top = (di * dayH) + 'px';
        cell.style.width = laneW + 'px';
        cell.style.height = dayH + 'px';

        const items = (bucket[keyOf(norm(lane.id), di)] || []).slice().sort(sortInCell);
        const maxTokens = 5;
        const overflow = Math.max(0, items.length - maxTokens);
        const shown = overflow > 0 ? (maxTokens - 1) : items.length;
        for (let i = 0; i < shown; i++) {
          const c = items[i];
          const t = getTaskById(c.taskId);
          const statusCls = normalizeStatus(c.status || (t && t.status) || '');
          const isTaskless = c.type === 'taskless';
          const taskOrder = t ? parseOrder(t.taskOrder) : Number.MAX_SAFE_INTEGER;
          const orderBadge = taskOrder < Number.MAX_SAFE_INTEGER ? taskOrder : (parseOrder(c.tasklessOrder) < Number.MAX_SAFE_INTEGER ? parseOrder(c.tasklessOrder) : '-');
          const sd = slotToDate(c.start, 'start');
          const ed = slotToDate(c.end, 'end');
          const curDay = toYmd(dayVals[di]);
          const arrow = (toYmd(sd.date) !== toYmd(ed.date)) ? (curDay === toYmd(sd.date) ? '→' : (curDay === toYmd(ed.date) ? '←' : '↔')) : '';
          const mainTxt = isTaskless ? (norm(c.memo) || norm(c.displayId || c.id)) : (norm((t && t.shotCode) || (t && t.name) || (t && t.id) || c.taskId));
          const token = document.createElement('div');
          token.className = 'token ' + (statusCls ? ('status-' + statusCls) : '') + (isTaskless ? ' taskless' : '') + (norm(state.selectionTokenId) === norm(c.id) ? ' selected' : '');
          token.innerHTML =
            `<span class="tk-order">${esc(String(orderBadge))}</span>` +
            `<span class="tk-main">${esc(mainTxt)}</span>` +
            (arrow ? `<span class="tk-arrow">${arrow}</span>` : '');
          token.title = (isTaskless ? `Taskless ${norm(c.displayId || c.id)}` : `Task ${norm(c.taskId)}`) + `\nLane: ${laneLabel(c.laneId)}`;
          token.addEventListener('click', (ev) => {
            ev.stopPropagation();
            state.selectionTokenId = c.id;
            render();
          });
          cell.appendChild(token);
        }
        if (overflow > 0) {
          const more = document.createElement('div');
          more.className = 'token more';
          more.textContent = `+${overflow} more`;
          cell.appendChild(more);
        }
        els.canvas.appendChild(cell);
      }
    }
    renderInspector();
  };

  const actions = {
    load: (opts) => {
      if (state.loading) return;
      const keepSelected = norm(opts && opts.keepSelected);
      state.loading = true;
      status('saving', 'Loading...');
      google.script.run
        .withSuccessHandler((raw) => {
          state.loading = false;
          let res = raw;
          if (typeof raw === 'string') {
            try { res = JSON.parse(raw); } catch (_) { res = { ok: false, error: { message: 'Invalid response' } }; }
          }
          if (!res || !res.ok) {
            status('error', String((res && res.error && (res.error.message || res.error)) || 'Load failed'));
            return;
          }
          initFromPayload(res);
          if (keepSelected) state.selectionTokenId = keepSelected;
          if (!tokenById(state.selectionTokenId)) state.selectionTokenId = '';
          render();
          status('saved', `Loaded ${state.cards.length} tokens / ${state.tasks.length} tasks`);
        })
        .withFailureHandler((err) => {
          state.loading = false;
          status('error', String(err && (err.message || err) || 'Load failed'));
        })
        .sv_scheduler_load_v2();
    },
    switchSched: (sid) => {
      const next = norm(sid);
      if (!next || next === norm(state.schedId)) return;
      status('saving', 'Switching schedule...');
      google.script.run
        .withSuccessHandler(() => actions.load())
        .withFailureHandler((err) => status('error', String(err && (err.message || err) || 'Switch failed')))
        .sv_scheduler_switch_active(next);
    },
    applyView: () => {
      const s = parseDateLoose(els.inpStart && els.inpStart.value);
      const e = parseDateLoose(els.inpEnd && els.inpEnd.value);
      const d = asInt(els.inpDays && els.inpDays.value, 1, state.dayCount);
      if (s) state.startDate = s;
      if (e && s) state.dayCount = Math.max(1, dayDiff(e, s) + 1);
      else state.dayCount = Math.max(1, Math.min(730, d));
      render();
    },
    saveView: () => {
      const visMap = {};
      state.lanes.forEach((l) => { visMap[norm(l.id)] = state.laneVisibility[norm(l.id)] !== false; });
      const meta = Object.assign({}, state.viewMeta || {}, {
        startDate: toYmd(state.startDate),
        dayCount: state.dayCount,
        endDate: toYmd(addDays(state.startDate, Math.max(0, state.dayCount - 1))),
        laneVisibility: visMap,
        viewMode: 'lite'
      });
      status('saving', 'Saving view...');
      google.script.run
        .withSuccessHandler(() => { status('saved', 'View saved'); })
        .withFailureHandler((err) => { status('error', String(err && (err.message || err) || 'View save failed')); })
        .sv_scheduler_save_meta_v2(JSON.stringify({ schedId: state.schedId, type: 'view_meta', value: meta }));
    },
    saveLane: () => actions.saveView(),
    patchTaskField: (taskId, def, nextValue) => {
      const tid = norm(taskId);
      const fid = norm(def && def.fid);
      if (!tid || !fid) return;
      const patch = {};
      const type = lower(def && def.type);
      if (type === 'checkbox') patch[fid] = !!nextValue;
      else patch[fid] = (nextValue === null || nextValue === undefined) ? '' : String(nextValue);
      status('saving', `Saving ${def.label || fid}...`);
      google.script.run
        .withSuccessHandler((res) => {
          const ok = !!(res && res.ok);
          if (!ok) {
            status('error', String((res && (res.error || res.note)) || 'Task save failed'));
            return;
          }
          status('saved', 'Task saved');
          actions.load({ keepSelected: state.selectionTokenId });
        })
        .withFailureHandler((err) => {
          status('error', String(err && (err.message || err) || 'Task save failed'));
        })
        .sv_setRecord_v2('task', tid, patch, { actor: 'schedview_inspector' });
    },
    openEdit: () => {
      const base = norm(state.scriptUrl || (location.origin + location.pathname)).replace(/\?.*$/, '');
      const sid = encodeURIComponent(norm(state.schedId || ''));
      (window.top || window).location.href = `${base}?p=schedule&schedId=${sid}`;
    },
    openIndex: () => {
      const base = norm(state.scriptUrl || (location.origin + location.pathname)).replace(/\?.*$/, '');
      (window.top || window).location.href = `${base}?p=table&e=scheds`;
    }
  };

  const bind = () => {
    if (els.schedSwitch) els.schedSwitch.addEventListener('change', (e) => actions.switchSched(e.target.value));
    const btnReload = document.getElementById('btn-reload');
    if (btnReload) btnReload.addEventListener('click', () => actions.load());
    const btnEdit = document.getElementById('btn-edit');
    if (btnEdit) btnEdit.addEventListener('click', actions.openEdit);
    const btnIndex = document.getElementById('btn-index');
    if (btnIndex) btnIndex.addEventListener('click', actions.openIndex);
    const btnView = document.getElementById('btn-view');
    if (btnView) btnView.addEventListener('click', (e) => { e.stopPropagation(); togglePopup('view'); });
    const btnLanes = document.getElementById('btn-lanes');
    if (btnLanes) btnLanes.addEventListener('click', (e) => { e.stopPropagation(); togglePopup('lane'); });
    const btnViewApply = document.getElementById('btn-view-apply');
    if (btnViewApply) btnViewApply.addEventListener('click', actions.applyView);
    const btnViewSave = document.getElementById('btn-view-save');
    if (btnViewSave) btnViewSave.addEventListener('click', actions.saveView);
    const btnLaneSave = document.getElementById('btn-lane-save');
    if (btnLaneSave) btnLaneSave.addEventListener('click', actions.saveLane);
    if (els.gridScroll && els.laneHeaderScroll) {
      els.gridScroll.addEventListener('scroll', () => { els.laneHeaderScroll.scrollLeft = els.gridScroll.scrollLeft; });
    }
    document.addEventListener('click', (e) => {
      const inGroup = !!(e.target && e.target.closest && e.target.closest('.toolbar-group'));
      if (!inGroup) closePopups();
    });
    if (els.canvas) {
      els.canvas.addEventListener('click', (e) => {
        if (e.target === els.canvas) {
          state.selectionTokenId = '';
          renderInspector();
        }
      });
    }
  };

  return { bind, actions };
})();

document.addEventListener('DOMContentLoaded', () => {
  window.app.bind();
  window.app.actions.load();
});
</script>
</body>
</html>
