<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOTK SchedView</title>
  <style>
    :root {
      --bg-app: #0e0e10;
      --bg-header: #121214;
      --bg-panel: #17181c;
      --bg-grid: #0f1015;
      --bg-cell: #14161d;
      --border: #2a2d35;
      --text-main: #e5e7eb;
      --text-dim: #9ca3af;
      --accent: #2563eb;
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
      --lane-w: 150px;
      --day-h: 92px;
      --inspector-w: 340px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-app); color: var(--text-main); font-family: sans-serif; }
    #app { height: 100%; display: flex; flex-direction: column; }

    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-header);
      flex-shrink: 0;
    }
    .brand a { color: #fff; text-decoration: none; font-weight: 900; font-size: 13px; }
    .brand span { color: var(--accent); }
    .btn {
      background: #23252d;
      border: 1px solid #3a3e49;
      color: #e5e7eb;
      padding: 5px 10px;
      font-size: 11px;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:hover { background: #323844; }
    .inp {
      background: #0f1218;
      border: 1px solid #3a3e49;
      color: #fff;
      border-radius: 5px;
      font-size: 11px;
      padding: 5px 8px;
    }
    .tag {
      border: 1px solid #323744;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .toolbar-group { position: relative; display: inline-flex; align-items: center; }
    .toolbar-pop {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 260px;
      max-width: min(380px, calc(100vw - 24px));
      max-height: min(70vh, calc(100vh - 70px));
      background: #111216;
      border: 1px solid #2f3138;
      border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
      padding: 8px;
      overflow: auto;
      z-index: 20;
      display: none;
    }
    .toolbar-pop.open { display: block; }
    .toolbar-pop .pop-title { font-size: 10px; color: #9aa1ac; margin-bottom: 8px; }
    .toolbar-pop .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .toolbar-pop .row label { width: 70px; font-size: 10px; color: #a5adba; }
    .lane-list {
      max-height: 360px;
      overflow: auto;
      border: 1px solid #2c3340;
      border-radius: 6px;
      padding: 6px;
      background: #14171d;
    }
    .lane-row {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 11px;
      color: #e5e7eb;
    }
    .lane-row:last-child { margin-bottom: 0; }
    .lane-row input[type="checkbox"] { accent-color: #38bdf8; margin: 0; }
    .lane-row .lane-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.25;
    }
    .lane-row.assets .lane-name { color: #93c5fd; font-weight: 700; letter-spacing: 0.03em; }
    #status { font-size: 11px; margin-left: 6px; min-width: 180px; max-width: 38vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #status.saving { color: var(--warn); }
    #status.saved { color: var(--ok); }
    #status.error { color: var(--err); }

    #main { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    #grid-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    #lane-header-scroll {
      height: 36px;
      display: flex;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
      flex-shrink: 0;
    }
    #year-corner {
      width: 62px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: #101117;
      position: sticky;
      left: 0;
      z-index: 5;
    }
    #lane-headers { display: flex; }
    .lane-head {
      width: var(--lane-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      font-size: 11px;
      color: #d1d5db;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #grid-scroll { flex: 1; min-height: 0; display: flex; overflow: auto; position: relative; background: var(--bg-grid); }
    #date-axis {
      width: 62px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: #101117;
      position: sticky;
      left: 0;
      z-index: 4;
      min-height: 100%;
    }
    .date-cell {
      height: var(--day-h);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-dim);
      background: #101117;
    }
    .date-cell.today { background: rgba(37, 99, 235, 0.14); color: #eef2ff; }
    .date-cell .main { font-size: 13px; font-weight: 700; line-height: 1.05; color: #e5e7eb; }
    .date-cell .sub { font-size: 10px; line-height: 1.1; }

    #canvas { position: relative; min-height: 100%; background: var(--bg-grid); }
    .cell {
      position: absolute;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg-cell);
      overflow: hidden;
      padding: 4px;
    }
    .token {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 3px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 10px;
      line-height: 1.2;
      padding: 2px 4px;
      background: rgba(37, 99, 235, 0.30);
      color: #e5e7eb;
      min-height: 18px;
      cursor: pointer;
    }
    .token.selected { box-shadow: 0 0 0 1px #67e8f9, inset 0 0 0 1px rgba(255,255,255,0.25); }
    .token.taskless { background: rgba(71, 85, 105, 0.45); }
    .token.asset { background: rgba(3, 105, 161, 0.42); }
    .token.status-not_started { background: rgba(29, 78, 216, 0.35); }
    .token.status-in_progress { background: rgba(124, 58, 237, 0.35); }
    .token.status-review { background: rgba(217, 119, 6, 0.35); }
    .token.status-approved { background: rgba(15, 118, 110, 0.35); }
    .token.status-completed { background: rgba(22, 101, 52, 0.35); }
    .tk-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 16px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #cbd5e1;
      background: rgba(17, 24, 39, 0.55);
      font-size: 9px;
      font-weight: 700;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .tk-main { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 auto; }
    .tk-sub {
      max-width: 48%;
      color: #cbd5e1;
      font-size: 9px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 0 1 auto;
      opacity: 0.92;
    }
    .tk-arrow { font-size: 10px; color: #c7d2fe; flex-shrink: 0; }
    .token.more { background: rgba(17, 24, 39, 0.55); color: #cbd5e1; justify-content: center; cursor: default; }
    #empty { display: none; padding: 16px; color: #9ca3af; font-size: 12px; }
    #empty.show { display: block; }

    #inspector {
      width: var(--inspector-w);
      flex: 0 0 var(--inspector-w);
      min-width: 280px;
      max-width: 520px;
      background: #15161c;
      display: flex;
      flex-direction: column;
    }
    #insp-head {
      height: 36px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #insp-content {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .inp-group { display: flex; flex-direction: column; gap: 4px; }
    .inp-group label { font-size: 10px; color: #9ca3af; }
    .inp-group input, .inp-group select, .inp-group textarea {
      background: #0f1218;
      border: 1px solid #353a45;
      color: #fff;
      border-radius: 5px;
      font-size: 11px;
      padding: 6px 8px;
      width: 100%;
    }
    .inp-group textarea { min-height: 56px; resize: vertical; }
    .meta { font-size: 10px; color: #8f96a3; }
    .row2 { display: flex; gap: 8px; }
    .row2 > .inp-group { flex: 1; }
    .settings-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 120; display: flex; align-items: center; justify-content: center; padding: 16px; }
    .settings-modal.hidden { display: none; }
    .settings-panel { width: min(960px, 96vw); max-height: 92vh; overflow: auto; background: #17171a; border: 1px solid #333; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.45); }
    .settings-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #2c2c30; background: #121214; position: sticky; top: 0; z-index: 1; }
    .settings-title { font-size: 13px; font-weight: 700; color: #fff; }
    .settings-body { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px; }
    .settings-section { border: 1px solid #2d2d31; border-radius: 8px; padding: 10px; background: #1c1c20; display: flex; flex-direction: column; gap: 8px; }
    .settings-section h4 { margin: 0; font-size: 12px; color: #ddd; letter-spacing: 0.03em; }
    .settings-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .settings-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .settings-inline { display: flex; gap: 6px; align-items: flex-end; }
    .settings-inline .inp-group { flex: 1 1 auto; }
    .settings-inline .btn { height: 26px; }
    .settings-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 0 12px 12px; }
    .settings-body .settings-actions { padding: 0; }
    .settings-panel .inp-dark { background: #000; border: 1px solid #333; color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 4px; width: 100%; }

    @media (max-width: 1140px) {
      :root { --lane-w: 132px; --day-h: 80px; --inspector-w: 300px; }
      #status { max-width: 28vw; }
      .tag.hide-sm { display: none; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="brand"><a id="brand-link" href="#">MOTK <span>SCHEDVIEW</span></a></div>
    <select id="sched-switch" class="inp" style="min-width:150px;"></select>
    <div class="tag hide-sm" id="tag-origin">Origin: -</div>
    <div class="tag hide-sm" id="tag-slot">Slot: -</div>
    <div class="tag hide-sm" id="tag-work">Work: -</div>
    <div class="tag hide-sm" id="tag-tz">TZ: -</div>
    <div style="flex:1;"></div>

    <div class="toolbar-group" style="display:flex; gap:6px; align-items:center;">
      <span class="tag">Zoom</span>
      <input id="sv-zoom" type="range" min="1" max="170" value="86" style="width:130px;">
      <input id="sv-zoom-val" class="inp" type="number" min="1" max="170" step="1" value="86" style="width:58px; text-align:center;">
      <label style="display:inline-flex; align-items:center; gap:4px; font-size:11px; color:#cbd5e1; margin-left:6px;">
        <input id="sv-auto-height" type="checkbox">
        Auto height
      </label>
    </div>
    <div id="status"></div>
    <button id="btn-edit" class="btn" type="button">Edit Mode</button>
    <button id="btn-settings" class="btn" type="button">Settings</button>
  </div>

  <div id="main">
    <div id="grid-wrap">
      <div id="lane-header-scroll">
        <div id="year-corner">----</div>
        <div id="lane-headers"></div>
      </div>
      <div id="grid-scroll">
        <div id="date-axis"></div>
        <div id="canvas"></div>
      </div>
      <div id="empty">No tasks/cards to display in current range.</div>
    </div>
    <div id="inspector">
      <div id="insp-head">INSPECTOR</div>
      <div id="insp-content">Select a token.</div>
    </div>
  </div>
</div>
<div id="settings-modal" class="settings-modal hidden" aria-hidden="true">
  <div class="settings-panel">
    <div class="settings-head">
      <div class="settings-title">Scheduler Settings</div>
      <button id="btn-settings-close" class="btn" type="button">Close</button>
    </div>
    <div class="settings-body">
      <section class="settings-section">
        <h4>View</h4>
        <div class="settings-grid-2">
          <div class="inp-group">
            <label for="sv-start-preset">Start preset</label>
            <select id="sv-start-preset" class="inp-dark">
              <option value="today">Today</option>
              <option value="yesterday">Yesterday</option>
              <option value="tomorrow">Tomorrow</option>
              <option value="this_monday">This Monday</option>
              <option value="next_monday">Next Monday</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="inp-group">
            <label for="sv-start-date">Start date</label>
            <input id="sv-start-date" class="inp-dark" type="text" placeholder="YYYY/MM/DD or today">
          </div>
          <div class="inp-group">
            <label for="sv-end-preset">End preset</label>
            <select id="sv-end-preset" class="inp-dark">
              <option value="today">Today</option>
              <option value="yesterday">Yesterday</option>
              <option value="tomorrow">Tomorrow</option>
              <option value="this_monday">This Monday</option>
              <option value="next_monday">Next Monday</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="inp-group">
            <label for="sv-end-date">End date</label>
            <input id="sv-end-date" class="inp-dark" type="text" placeholder="YYYY/MM/DD or today">
          </div>
          <div class="inp-group">
            <label for="sv-range">Range</label>
            <select id="sv-range" class="inp-dark">
              <option value="1">1 Day</option>
              <option value="5">1 Week</option>
              <option value="14">2 Weeks</option>
              <option value="30">1 Month</option>
              <option value="90">3 Months</option>
              <option value="180">6 Months</option>
              <option value="365">1 Year</option>
              <option value="730">2 Years</option>
              <option value="custom">Custom</option>
            </select>
          </div>
          <div class="inp-group">
            <label for="sv-day-count">Days</label>
            <input id="sv-day-count" class="inp-dark" type="number" min="1" max="730" step="1">
          </div>
        </div>
        <div class="settings-actions">
          <button id="btn-view-fit" class="btn" type="button">Fit</button>
          <button id="btn-view-apply" class="btn" type="button">Apply</button>
          <button id="btn-view-save" class="btn" type="button">Save View</button>
        </div>
        <label style="font-size:11px; color:#aaa; display:flex; gap:6px; align-items:center;">
          <input id="sv-chk-push" type="checkbox"> Auto-Push
        </label>
      </section>

      <section class="settings-section">
        <h4>Lane</h4>
        <div class="settings-grid-2">
          <div class="inp-group">
            <label for="sv-lane-w">Lane width</label>
            <input id="sv-lane-w" class="inp-dark" type="number" min="40" max="560" step="1">
          </div>
          <div class="inp-group">
            <label for="sv-asset-lane-w">Assets width</label>
            <input id="sv-asset-lane-w" class="inp-dark" type="number" min="40" max="560" step="1">
          </div>
        </div>
        <div class="inp-group">
          <label for="lane-menu-list">Lane Visibility</label>
          <div id="lane-menu-list" class="lane-list"></div>
        </div>
        <div class="settings-actions">
          <button id="btn-lane-save" class="btn" type="button">Save Lane</button>
        </div>
      </section>

      <section class="settings-section">
        <h4>Task Display</h4>
        <div class="settings-grid-2">
          <div class="inp-group">
            <label for="sv-disp-main">Main (center)</label>
            <select id="sv-disp-main" class="inp-dark"></select>
          </div>
          <div class="inp-group">
            <label for="sv-disp-sub">Sub (right)</label>
            <select id="sv-disp-sub" class="inp-dark"></select>
          </div>
          <div class="inp-group">
            <label for="sv-disp-taskless-main">Taskless Main</label>
            <select id="sv-disp-taskless-main" class="inp-dark"></select>
          </div>
          <div class="inp-group">
            <label for="sv-disp-taskless-sub">Taskless Sub</label>
            <select id="sv-disp-taskless-sub" class="inp-dark"></select>
          </div>
        </div>
        <div class="settings-inline">
          <div class="inp-group">
            <label for="sv-disp-add-field">Add field</label>
            <select id="sv-disp-add-field" class="inp-dark"></select>
          </div>
          <div class="inp-group" style="max-width:140px;">
            <label for="sv-disp-add-target">Target</label>
            <select id="sv-disp-add-target" class="inp-dark">
              <option value="main">Main</option>
              <option value="sub">Sub</option>
              <option value="taskless_main">Taskless Main</option>
              <option value="taskless_sub">Taskless Sub</option>
            </select>
          </div>
          <button id="btn-disp-add-field" class="btn" type="button">+ Add</button>
        </div>
      </section>
    </div>
    <div class="settings-actions">
      <button id="btn-settings-save" class="btn" type="button">Save Settings</button>
    </div>
  </div>
</div>

<script>
window.app = (function() {
  const state = {
    scriptUrl: '',
    schedId: 'sched_0001',
    schedName: 'Schedule',
    allScheds: [],
    viewMeta: {},
    cardViewMeta: {},
    laneVisibility: {},
    tasks: [],
    tasksById: {},
    taskFieldDefs: [],
    cards: [],
    lanes: [],
    assetNameById: {},
    config: { originDate: null, slotMin: 30, workHours: 8 },
    dayCount: 14,
    dayPx: 92,
    laneWidth: 150,
    assetLaneWidth: 150,
    assetLaneVisible: true,
    startPreset: 'custom',
    endPreset: 'custom',
    autoPush: true,
    autoCellHeight: false,
    taskDisplayMain: 'shot_code',
    taskDisplaySub: 'task_name',
    tasklessDisplayMain: 'card_memo',
    tasklessDisplaySub: 'card_order',
    customDisplayFields: [],
    startDate: null,
    selectionTokenId: '',
    renderTokens: [],
    loading: false
  };

  const ASSETS_LANE_ID = '__assets__';
  const ASSETS_LANE_LABEL = 'ASSETS';

  const els = {
    brandLink: document.getElementById('brand-link'),
    schedSwitch: document.getElementById('sched-switch'),
    laneHeaders: document.getElementById('lane-headers'),
    yearCorner: document.getElementById('year-corner'),
    dateAxis: document.getElementById('date-axis'),
    canvas: document.getElementById('canvas'),
    gridScroll: document.getElementById('grid-scroll'),
    laneHeaderScroll: document.getElementById('lane-header-scroll'),
    status: document.getElementById('status'),
    empty: document.getElementById('empty'),
    tagOrigin: document.getElementById('tag-origin'),
    tagSlot: document.getElementById('tag-slot'),
    tagWork: document.getElementById('tag-work'),
    tagTz: document.getElementById('tag-tz'),
    laneMenuList: document.getElementById('lane-menu-list'),
    inpStart: document.getElementById('sv-start-date'),
    inpEnd: document.getElementById('sv-end-date'),
    inpDays: document.getElementById('sv-day-count'),
    inpStartPreset: document.getElementById('sv-start-preset'),
    inpEndPreset: document.getElementById('sv-end-preset'),
    inpRange: document.getElementById('sv-range'),
    chkPush: document.getElementById('sv-chk-push'),
    inpLaneW: document.getElementById('sv-lane-w'),
    inpAssetLaneW: document.getElementById('sv-asset-lane-w'),
    inpZoom: document.getElementById('sv-zoom'),
    inpZoomVal: document.getElementById('sv-zoom-val'),
    chkAutoHeight: document.getElementById('sv-auto-height'),
    selDispMain: document.getElementById('sv-disp-main'),
    selDispSub: document.getElementById('sv-disp-sub'),
    selDispTasklessMain: document.getElementById('sv-disp-taskless-main'),
    selDispTasklessSub: document.getElementById('sv-disp-taskless-sub'),
    selDispAddField: document.getElementById('sv-disp-add-field'),
    selDispAddTarget: document.getElementById('sv-disp-add-target'),
    btnDispAddField: document.getElementById('btn-disp-add-field'),
    settingsModal: document.getElementById('settings-modal'),
    inspContent: document.getElementById('insp-content')
  };

  const status = (kind, msg) => {
    if (!els.status) return;
    els.status.className = kind || '';
    els.status.textContent = String(msg || '');
  };
  const norm = (v) => String(v === null || v === undefined ? '' : v).trim();
  const lower = (v) => norm(v).toLowerCase();
  const asNum = (v, fb) => { const n = Number(v); return isFinite(n) ? n : fb; };
  const asInt = (v, min, fb) => { const n = Math.round(Number(v)); return isFinite(n) ? Math.max(min, n) : fb; };
  const esc = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const toYmd = (d) => {
    if (!(d instanceof Date) || isNaN(d.getTime())) return '';
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  };

    const be = b.endDateYmd || '';
    if (ae !== be) return ae < be ? -1 : 1;
    return norm(a.id).localeCompare(norm(b.id));
  };

  const renderSchedSwitch = () => {
    if (!els.schedSwitch) return;
    els.schedSwitch.innerHTML = '';
    const list = (state.allScheds && state.allScheds.length) ? state.allScheds : [{ id: state.schedId, name: state.schedName }];
    list.forEach((s) => {
      const id = norm(s && s.id);
      if (!id) return;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = norm(s && s.name) || id;
      if (id === norm(state.schedId)) opt.selected = true;
      els.schedSwitch.appendChild(opt);
    });
  };

  const buildAssetLaneTokens = (dayVals) => {
    if (!state.assetLaneVisible || !Array.isArray(dayVals) || !dayVals.length) return [];
    const out = [];
    dayVals.forEach((d) => {
      const ymd = toYmd(d);
      const map = {};
      state.cards.forEach((c) => {
        if (!c || c.type !== 'task') return;
        const s = parseDateLoose(c.startDate);
        const e = parseDateLoose(c.endDate || c.startDate);
        if (!s || !e || d < s || d > e) return;
        const t = getTaskById(c.taskId);
        if (!t) return;
        const assetIds = Array.isArray(t.assetIds) ? t.assetIds : [];
        assetIds.forEach((aidRaw) => {
          const aid = norm(aidRaw);
          if (!aid) return;
          if (!map[aid]) map[aid] = { minOrder: Number.MAX_SAFE_INTEGER, taskIds: {} };
          map[aid].minOrder = Math.min(map[aid].minOrder, getTokenOrder_(c));
          map[aid].taskIds[norm(t.id)] = true;
        });
      });
      Object.keys(map).forEach((aid) => {
        const taskIds = Object.keys(map[aid].taskIds || {});
        out.push({
          id: `asset:${ymd}:${aid}`,
          type: 'asset',
          laneId: ASSETS_LANE_ID,
          startDate: new Date(d.getFullYear(), d.getMonth(), d.getDate()),
          endDate: new Date(d.getFullYear(), d.getMonth(), d.getDate()),
          startDateYmd: ymd,
          endDateYmd: ymd,
          assetId: aid,
          assetName: norm(state.assetNameById && state.assetNameById[aid]) || aid,
          assetTaskCount: taskIds.length,
          linkedTaskIds: taskIds,
          assetOrder: map[aid].minOrder,
          displayOrder: map[aid].minOrder,
          displayId: aid
        });
      });
    });
    return out;
  };

  const buildDisplayOptions = () => {
    const options = DISPLAY_BASE_OPTIONS.slice();
    const seen = {};
    options.forEach((o) => { seen[String(o.value || '')] = true; });
    const pushOpt = (value, label) => {
      const v = normalizeDisplayField(value, '');
      if (!v || seen[v]) return;
      seen[v] = true;
      options.push({ value: v, label: String(label || v) });
    };
    (state.customDisplayFields || []).forEach((v) => pushOpt(v, String(v || '').replace(':', ': ')));
    state.taskFieldDefs.forEach((def) => {
      if (!def || !def.fid) return;
      pushOpt('task:' + def.fid, `Task: ${def.label || def.fid}`);
    });
    state.tasks.slice(0, 200).forEach((t) => {
      if (!t || typeof t !== 'object') return;
      Object.keys(t).forEach((k) => {
        if (k === 'fields') return;
        const v = t[k];
        if (v && typeof v === 'object') return;
        pushOpt('task:' + k, `Task: ${k}`);
      });
    });
    return options;
  };

  const syncDisplaySelectors_ = () => {
    const sels = [els.selDispMain, els.selDispSub, els.selDispTasklessMain, els.selDispTasklessSub].filter(Boolean);
    if (!sels.length) return;
    const options = buildDisplayOptions();
    const renderTo = (sel, selected, fallback) => {
      if (!sel) return;
      const normalized = normalizeDisplayField(selected, fallback);
      sel.innerHTML = '';
      options.forEach((opt) => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        sel.appendChild(o);
      });
      const values = options.map((o) => String(o.value || ''));
      sel.value = values.indexOf(normalized) >= 0 ? normalized : fallback;
    };
    renderTo(els.selDispMain, state.taskDisplayMain, 'shot_code');
    renderTo(els.selDispSub, state.taskDisplaySub, 'task_name');
    renderTo(els.selDispTasklessMain, state.tasklessDisplayMain, 'card_memo');
    renderTo(els.selDispTasklessSub, state.tasklessDisplaySub, 'card_order');
    state.taskDisplayMain = normalizeDisplayField(els.selDispMain ? els.selDispMain.value : state.taskDisplayMain, 'shot_code');
    state.taskDisplaySub = normalizeDisplayField(els.selDispSub ? els.selDispSub.value : state.taskDisplaySub, 'task_name');
    state.tasklessDisplayMain = normalizeDisplayField(els.selDispTasklessMain ? els.selDispTasklessMain.value : state.tasklessDisplayMain, 'card_memo');
    state.tasklessDisplaySub = normalizeDisplayField(els.selDispTasklessSub ? els.selDispTasklessSub.value : state.tasklessDisplaySub, 'card_order');

    if (els.selDispAddField) {
      const prev = norm(els.selDispAddField.value);
      els.selDispAddField.innerHTML = '';
      options.forEach((opt) => {
        const o = document.createElement('option');
        o.value = opt.value;
        o.textContent = opt.label;
        els.selDispAddField.appendChild(o);
      });
      if (prev && options.some((opt) => norm(opt.value) === prev)) els.selDispAddField.value = prev;
    }
  };

  const renderLaneMenu = () => {
    if (!els.laneMenuList) return;
    els.laneMenuList.innerHTML = '';
    const assetsRow = document.createElement('div');
    assetsRow.className = 'lane-row assets';
    const assetsChk = document.createElement('input');
    assetsChk.type = 'checkbox';
    assetsChk.checked = !!state.assetLaneVisible;
    assetsChk.addEventListener('change', () => {
      state.assetLaneVisible = !!assetsChk.checked;
      state.laneVisibility[ASSETS_LANE_ID] = state.assetLaneVisible;
      render();
    });
    const assetsTxt = document.createElement('span');
    assetsTxt.className = 'lane-name';
    assetsTxt.textContent = ASSETS_LANE_LABEL;
    assetsRow.appendChild(assetsChk);
    assetsRow.appendChild(assetsTxt);
    els.laneMenuList.appendChild(assetsRow);

    state.lanes.forEach((lane) => {
      const id = norm(lane.id);
      const row = document.createElement('div');
      row.className = 'lane-row';
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.checked = state.laneVisibility[id] !== false;
      chk.addEventListener('change', () => {
        state.laneVisibility[id] = !!chk.checked;
        render();
      });
      const txt = document.createElement('span');
      txt.className = 'lane-name';
      txt.textContent = norm(lane.label) || id;
      row.appendChild(chk);
      row.appendChild(txt);
      els.laneMenuList.appendChild(row);
    });
  };

  const renderViewInputs = () => {
    if (els.inpStart) els.inpStart.value = toYmd(state.startDate);
    const end = addDays(state.startDate, Math.max(0, state.dayCount - 1));
    if (els.inpEnd) els.inpEnd.value = toYmd(end);
    if (els.inpDays) els.inpDays.value = String(state.dayCount);
    if (els.inpStartPreset) els.inpStartPreset.value = normalizePresetKey_(state.startPreset);
    if (els.inpEndPreset) els.inpEndPreset.value = normalizePresetKey_(state.endPreset);
    if (els.inpRange) {
      const opts = getRangeOptions_().map((n) => String(n));
      els.inpRange.value = opts.indexOf(String(state.dayCount)) >= 0 ? String(state.dayCount) : 'custom';
    }
    if (els.chkPush) els.chkPush.checked = !!state.autoPush;
    if (els.inpLaneW) els.inpLaneW.value = String(state.laneWidth || 150);
    if (els.inpAssetLaneW) els.inpAssetLaneW.value = String(state.assetLaneWidth || state.laneWidth || 150);
    if (els.chkAutoHeight) els.chkAutoHeight.checked = !!state.autoCellHeight;
    syncDisplaySelectors_();
  };

  const resolveTaskDisplayByField_ = (tok, task, fieldKey) => {
    const key = normalizeDisplayField(fieldKey, 'task_name');
    if (/^task:/i.test(key)) {
      const dyn = key.replace(/^task:/i, '');
      if (!task) return '';
      if (task.fields && Object.prototype.hasOwnProperty.call(task.fields, dyn)) return String(task.fields[dyn] == null ? '' : task.fields[dyn]).trim();
      return String(task[dyn] == null ? '' : task[dyn]).trim();
    }
    if (!task) return '';
    if (key === 'shot_code') return norm(task.shotCode);
    if (key === 'shot_id') return norm(task.shotId);
    if (key === 'task_name') return norm(task.name);
    if (key === 'task_status') return norm(task.status);
    if (key === 'task_assignee') return laneLabel(task.assignee);
    if (key === 'task_est_length') return formatMinutesLabel(task.estLength || (task.fields && task.fields.fi_0074));
    if (key === 'task_id') return norm(task.id);
    if (key === 'task_order') return String(getTokenOrder_(tok) < Number.MAX_SAFE_INTEGER ? getTokenOrder_(tok) : '');
    if (key === 'start_date') return norm(tok.startDateYmd || toYmd(tok.startDate));
    if (key === 'end_date') return norm(tok.endDateYmd || toYmd(tok.endDate));
    return '';
  };

  const resolveTasklessDisplayByField_ = (tok, fieldKey) => {
    const key = normalizeDisplayField(fieldKey, 'card_memo');
    if (/^taskless:/i.test(key)) {
      const dyn = key.replace(/^taskless:/i, '');
      return String(tok && tok[dyn] == null ? '' : tok[dyn]).trim();
    }
    if (key === 'card_memo') return norm(tok && tok.memo);
    if (key === 'card_id') return norm(tok && (tok.displayId || tok.id));
    if (key === 'card_order') return String(getTokenOrder_(tok) < Number.MAX_SAFE_INTEGER ? getTokenOrder_(tok) : '');
    if (key === 'card_lane') return laneLabel(tok && tok.laneId);
    if (key === 'start_date') return norm(tok && (tok.startDateYmd || toYmd(tok.startDate)));
    if (key === 'end_date') return norm(tok && (tok.endDateYmd || toYmd(tok.endDate)));
    if (key === 'card_length_days') {
      const s = parseDateLoose(tok && tok.startDate);
      const e = parseDateLoose(tok && (tok.endDate || tok.startDate));
      if (!s || !e) return '';
      return String(Math.max(1, dayDiff(e, s) + 1));
    }
    return '';
  };

  const resolveAssetDisplayByField_ = (tok, fieldKey) => {
    const key = normalizeDisplayField(fieldKey, 'asset_name');
    if (/^asset:/i.test(key)) {
      const dyn = key.replace(/^asset:/i, '');
      return String(tok && tok[dyn] == null ? '' : tok[dyn]).trim();
    }
    if (key === 'asset_name') return norm(tok && tok.assetName);
    if (key === 'asset_id') return norm(tok && tok.assetId);
    if (key === 'asset_task_count') return String(Math.max(0, asInt(tok && tok.assetTaskCount, 0, 0)));
    if (key === 'asset_date') return norm(tok && tok.startDateYmd);
    if (key === 'task_order' || key === 'card_order') return String(getTokenOrder_(tok) < Number.MAX_SAFE_INTEGER ? getTokenOrder_(tok) : '');
    return '';
  };

  const getTokenDisplayModel_ = (tok) => {
    const ord = getTokenOrder_(tok);
    const orderText = ord < Number.MAX_SAFE_INTEGER ? String(ord) : '-';
    if (tok && tok.type === 'taskless') {
      const main = resolveTasklessDisplayByField_(tok, state.tasklessDisplayMain || 'card_memo') || resolveTasklessDisplayByField_(tok, 'card_memo') || norm(tok.displayId || tok.id);
      const sub = resolveTasklessDisplayByField_(tok, state.tasklessDisplaySub || 'card_order');
      return { orderText: orderText, mainText: main, subText: sub };
    }
    if (tok && tok.type === 'asset') {
      const main = resolveAssetDisplayByField_(tok, state.taskDisplayMain || 'asset_name') || resolveAssetDisplayByField_(tok, 'asset_name') || norm(tok.assetId);
      const sub = resolveAssetDisplayByField_(tok, state.taskDisplaySub || 'asset_task_count');
      return { orderText: orderText, mainText: main, subText: sub };
    }
    const task = getTaskById(tok && tok.taskId);
    const main = resolveTaskDisplayByField_(tok, task, state.taskDisplayMain || 'shot_code') || resolveTaskDisplayByField_(tok, task, 'shot_code') || resolveTaskDisplayByField_(tok, task, 'task_name') || norm((task && task.id) || tok.taskId);
    const sub = resolveTaskDisplayByField_(tok, task, state.taskDisplaySub || 'task_name');
    return { orderText: orderText, mainText: main, subText: sub };
  };

  const renderInspector = () => {
    if (!els.inspContent) return;
    const tok = tokenById(state.selectionTokenId);
    if (!tok) {
      els.inspContent.innerHTML = 'Select a token.';
      return;
    }
    const sDate = parseDateLoose(tok.startDate) || null;
    const eDate = parseDateLoose(tok.endDate) || sDate;
    const sYmd = sDate ? toYmdSlash(sDate) : '-';
    const eYmd = eDate ? toYmdSlash(eDate) : '-';
    if (tok.type === 'asset') {
      els.inspContent.innerHTML = '';
      const idBlock = document.createElement('div');
      idBlock.className = 'inp-group';
      idBlock.innerHTML = `<label>Asset</label><input class="inp" readonly value="${esc(norm(tok.assetName || tok.assetId))}">`;
      els.inspContent.appendChild(idBlock);
      const g1 = document.createElement('div');
      g1.className = 'row2';
      g1.innerHTML = `<div class="inp-group"><label>Asset ID</label><input class="inp" readonly value="${esc(norm(tok.assetId))}"></div>` +
        `<div class="inp-group"><label>Order</label><input class="inp" readonly value="${esc(String(getTokenOrder_(tok) < Number.MAX_SAFE_INTEGER ? getTokenOrder_(tok) : '-'))}"></div>`;
      els.inspContent.appendChild(g1);
      const g2 = document.createElement('div');
      g2.className = 'row2';
      g2.innerHTML = `<div class="inp-group"><label>Date</label><input class="inp" readonly value="${esc(sYmd)}"></div>` +
        `<div class="inp-group"><label>Linked Tasks</label><input class="inp" readonly value="${esc(String(Math.max(0, asInt(tok.assetTaskCount, 0, 0))))}"></div>`;
      els.inspContent.appendChild(g2);
      const linked = Array.isArray(tok.linkedTaskIds) ? tok.linkedTaskIds.join(', ') : '';
      const detail = document.createElement('div');
      detail.className = 'inp-group';
      detail.innerHTML = `<label>Task IDs</label><textarea readonly>${esc(linked)}</textarea>`;
      els.inspContent.appendChild(detail);
      return;
    }
    if (tok.type === 'taskless') {
      els.inspContent.innerHTML = '';
      const block = document.createElement('div');
      block.className = 'inp-group';
      block.innerHTML = `<label>Taskless Card</label><input class="inp" readonly value="${esc(norm(tok.displayId || tok.id))}">`;
      els.inspContent.appendChild(block);
      const g1 = document.createElement('div');
      g1.className = 'row2';
      g1.innerHTML = `<div class="inp-group"><label>Lane</label><input class="inp" readonly value="${esc(laneLabel(tok.laneId))}"></div>` +
        `<div class="inp-group"><label>Order</label><input class="inp" readonly value="${esc(String(getTokenOrder_(tok) < Number.MAX_SAFE_INTEGER ? getTokenOrder_(tok) : '-'))}"></div>`;
      els.inspContent.appendChild(g1);
      const g2 = document.createElement('div');
      g2.className = 'row2';
      g2.innerHTML = `<div class="inp-group"><label>Start</label><input class="inp" readonly value="${esc(sYmd)}"></div>` +
        `<div class="inp-group"><label>End</label><input class="inp" readonly value="${esc(eYmd)}"></div>`;
      els.inspContent.appendChild(g2);
      const memo = document.createElement('div');
      memo.className = 'inp-group';
      memo.innerHTML = `<label>Memo</label><textarea readonly>${esc(tok.memo || '')}</textarea>`;
      els.inspContent.appendChild(memo);
      return;
    }

    const task = getTaskById(tok.taskId);
    if (!task) {
      els.inspContent.innerHTML = '<div class="meta">Task not found.</div>';
      return;
    }

    els.inspContent.innerHTML = '';
    const head = document.createElement('div');
    head.innerHTML =
      `<div class="inp-group"><label>Task ID</label><input readonly value="${esc(task.id)}"></div>` +
      `<div class="inp-group"><label>Task Name</label><input readonly value="${esc(task.name)}"></div>` +
      `<div class="meta">Lane: ${esc(laneLabel(tok.laneId))} / ${esc(sYmd)} - ${esc(eYmd)}</div>`;
    els.inspContent.appendChild(head);

    state.taskFieldDefs.forEach((def) => {
      if (!def || !def.fid || !def.editable) return;
      const fid = def.fid;
      const type = lower(def.type);
      const row = document.createElement('div');
      row.className = 'inp-group';
      const label = document.createElement('label');
      label.textContent = def.label || fid;
      row.appendChild(label);
      const rawValue = task.fields && Object.prototype.hasOwnProperty.call(task.fields, fid) ? task.fields[fid] : '';
      const curValue = normalizeTaskFieldValue(def, rawValue);
      let inputEl = null;
      if (type === 'checkbox') {
        inputEl = document.createElement('input');
        inputEl.type = 'checkbox';
        inputEl.checked = !!curValue;
        inputEl.addEventListener('change', () => actions.patchTaskField(task.id, def, inputEl.checked));
      } else if (type === 'select' && Array.isArray(def.options) && def.options.length) {
        inputEl = document.createElement('select');
        def.options.forEach((optVal) => {
          const opt = document.createElement('option');
          opt.value = String(optVal);
          opt.textContent = String(optVal);
          inputEl.appendChild(opt);
        });
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('change', () => actions.patchTaskField(task.id, def, inputEl.value));
      } else if (type === 'text' || type === 'longtext') {
        inputEl = document.createElement('textarea');
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('blur', () => actions.patchTaskField(task.id, def, inputEl.value));
      } else {
        inputEl = document.createElement('input');
        inputEl.type = 'text';
        inputEl.value = String(curValue || '');
        inputEl.addEventListener('blur', () => actions.patchTaskField(task.id, def, inputEl.value));
      }
      row.appendChild(inputEl);
      els.inspContent.appendChild(row);
    });
  };

  const render = () => {
    renderSchedSwitch();
    renderLaneMenu();
    renderViewInputs();

    const lanes = visibleLanes();
    const dayVals = buildDayVals();
    if (!lanes.length || !dayVals.length) {
      state.renderTokens = [];
      if (els.empty) els.empty.classList.add('show');
      if (els.laneHeaders) els.laneHeaders.innerHTML = '';
      if (els.dateAxis) els.dateAxis.innerHTML = '';
      if (els.canvas) els.canvas.innerHTML = '';
      renderInspector();
      return;
    }

    const renderTokens = state.cards.slice().concat(buildAssetLaneTokens(dayVals));
    state.renderTokens = renderTokens;
    if (state.selectionTokenId && !tokenById(state.selectionTokenId)) state.selectionTokenId = '';

    if (els.empty) els.empty.classList.remove('show');

    const laneLayouts = [];
    let laneLeft = 0;
    lanes.forEach((lane) => {
      const laneId = norm(lane && lane.id);
      const width = laneId === ASSETS_LANE_ID
        ? Math.max(40, Math.round(Number(state.assetLaneWidth) || Number(state.laneWidth) || 150))
        : Math.max(40, Math.round(Number(state.laneWidth) || 150));
      laneLayouts.push({ lane: lane, id: laneId, width: width, left: laneLeft });
      laneLeft += width;
    });

    if (els.yearCorner) els.yearCorner.textContent = String(dayVals[0].getFullYear());
    if (els.laneHeaders) {
      els.laneHeaders.innerHTML = '';
      laneLayouts.forEach((layout) => {
        const d = document.createElement('div');
        d.className = 'lane-head';
        d.style.width = `${layout.width}px`;
        d.textContent = norm(layout.lane && layout.lane.label) || norm(layout.id);
        d.title = d.textContent;
        els.laneHeaders.appendChild(d);
      });
    }

    const dayHBase = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--day-h')) || state.dayPx || 92;
    const bucket = {};
    const keyOf = (laneId, dayIdx) => `${laneId}__${dayIdx}`;
    renderTokens.forEach((c) => {
      const laneId = norm(c.laneId) || 'unassigned';
      const sDate = parseDateLoose(c.startDate);
      const eDate = parseDateLoose(c.endDate || c.startDate);
      if (!sDate || !eDate) return;
      for (let di = 0; di < dayVals.length; di++) {
        const d = dayVals[di];
        if (d < sDate || d > eDate) continue;
        const k = keyOf(laneId, di);
        if (!bucket[k]) bucket[k] = [];
        bucket[k].push(c);
      }
    });

    const dayHeights = [];
    const dayOffsets = [];
    let cumulativeTop = 0;
    for (let di = 0; di < dayVals.length; di++) {
      let h = dayHBase;
      if (state.autoCellHeight) {
        let maxCnt = 0;
        for (let li = 0; li < laneLayouts.length; li++) {
          const k = keyOf(norm(laneLayouts[li].id), di);
          const cnt = (bucket[k] || []).length;
          if (cnt > maxCnt) maxCnt = cnt;
        }
        const needed = maxCnt > 0 ? (10 + (maxCnt * 21)) : dayHBase;
        h = Math.max(dayHBase, needed);
      }
      dayHeights[di] = h;
      dayOffsets[di] = cumulativeTop;
      cumulativeTop += h;
    }

    if (els.dateAxis) {
      const today = toYmd(new Date());
      els.dateAxis.innerHTML = '';
      dayVals.forEach((d, di) => {
        const n = document.createElement('div');
        n.className = 'date-cell' + (toYmd(d) === today ? ' today' : '');
        n.style.height = `${Math.max(1, dayHeights[di] || dayHBase)}px`;
        n.innerHTML = `<div class="main">${d.getMonth() + 1}/${d.getDate()}</div><div class="sub">(${weekday(d)})</div>`;
        els.dateAxis.appendChild(n);
      });
    }
    if (els.canvas) {
      els.canvas.style.width = laneLeft + 'px';
      els.canvas.style.height = `${Math.max(1, cumulativeTop)}px`;
      els.canvas.innerHTML = '';
    }

    for (let li = 0; li < laneLayouts.length; li++) {
      const lane = laneLayouts[li];
      for (let di = 0; di < dayVals.length; di++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.left = `${lane.left}px`;
        cell.style.top = `${Math.max(0, dayOffsets[di] || 0)}px`;
        cell.style.width = `${lane.width}px`;
        cell.style.height = `${Math.max(1, dayHeights[di] || dayHBase)}px`;

        const items = (bucket[keyOf(norm(lane.id), di)] || []).slice().sort(sortInCell);
        const maxTokens = state.autoCellHeight ? items.length : 5;
        const overflow = state.autoCellHeight ? 0 : Math.max(0, items.length - maxTokens);
        const shown = overflow > 0 ? (maxTokens - 1) : items.length;
        for (let i = 0; i < shown; i++) {
          const c = items[i];
          const t = getTaskById(c.taskId);
          const statusCls = c.type === 'task' ? normalizeStatus(c.status || (t && t.status) || '') : '';
          const isTaskless = c.type === 'taskless';
          const isAsset = c.type === 'asset';
          const display = getTokenDisplayModel_(c);
          const sd = parseDateLoose(c.startDate);
          const ed = parseDateLoose(c.endDate || c.startDate);
          if (!sd || !ed) continue;
          const curDay = toYmd(dayVals[di]);
          const sdYmd = toYmd(sd);
          const edYmd = toYmd(ed);
          const arrow = (!isAsset && sdYmd !== edYmd) ? (curDay === sdYmd ? '→' : (curDay === edYmd ? '←' : '↔')) : '';
          const token = document.createElement('div');
          token.className = 'token ' + (statusCls ? ('status-' + statusCls) : '') + (isTaskless ? ' taskless' : '') + (isAsset ? ' asset' : '') + (norm(state.selectionTokenId) === norm(c.id) ? ' selected' : '');
          token.innerHTML =
            `<span class="tk-order">${esc(String(display.orderText || '-'))}</span>` +
            `<span class="tk-main">${esc(display.mainText || '')}</span>` +
            (display.subText ? `<span class="tk-sub">${esc(display.subText)}</span>` : '') +
            (arrow ? `<span class="tk-arrow">${arrow}</span>` : '');
          token.title = (
            isAsset ? `Asset ${norm(c.assetName || c.assetId)}` :
            (isTaskless ? `Taskless ${norm(c.displayId || c.id)}` : `Task ${norm(c.taskId)}`)
          ) + `\nLane: ${laneLabel(c.laneId)}`;
          token.addEventListener('click', (ev) => {
            ev.stopPropagation();
            state.selectionTokenId = c.id;
            render();
          });
          cell.appendChild(token);
        }
        if (overflow > 0 && !state.autoCellHeight) {
          const more = document.createElement('div');
          more.className = 'token more';
          more.textContent = `+${overflow} more`;
          cell.appendChild(more);
        }
        els.canvas.appendChild(cell);
      }
    }
    renderInspector();
  };

  const actions = {
    load: (opts) => {
      if (state.loading) return;
      const keepSelected = norm(opts && opts.keepSelected);
      state.loading = true;
      status('saving', 'Loading...');
      google.script.run
        .withSuccessHandler((raw) => {
          state.loading = false;
          let res = raw;
          if (typeof raw === 'string') {
            try { res = JSON.parse(raw); } catch (_) { res = { ok: false, error: { message: 'Invalid response' } }; }
          }
          if (!res || !res.ok) {
            status('error', String((res && res.error && (res.error.message || res.error)) || 'Load failed'));
            return;
          }
          initFromPayload(res);
          if (keepSelected) state.selectionTokenId = keepSelected;
          if (!tokenById(state.selectionTokenId)) state.selectionTokenId = '';
          render();
          status('saved', `Loaded ${state.cards.length} tokens / ${state.tasks.length} tasks`);
        })
        .withFailureHandler((err) => {
          state.loading = false;
          status('error', String(err && (err.message || err) || 'Load failed'));
        })
        .sv_scheduler_load_v2();
    },
    switchSched: (sid) => {
      const next = norm(sid);
      if (!next || next === norm(state.schedId)) return;
      status('saving', 'Switching schedule...');
      google.script.run
        .withSuccessHandler(() => actions.load())
        .withFailureHandler((err) => status('error', String(err && (err.message || err) || 'Switch failed')))
        .sv_scheduler_switch_active(next);
    },
    setStartPreset: (preset) => {
      const key = normalizePresetKey_(preset);
      state.startPreset = key;
      if (key === 'custom') return;
      const d = resolveDatePreset_(key);
      if (!d) return;
      state.startDate = d;
      render();
    },
    setEndPreset: (preset) => {
      const key = normalizePresetKey_(preset);
      state.endPreset = key;
      if (key === 'custom') return;
      const d = resolveDatePreset_(key);
      if (!d) return;
      const diff = dayDiff(d, state.startDate) + 1;
      state.dayCount = Math.max(1, Math.min(730, diff));
      render();
    },
    setDuration: (daysRaw) => {
      const d = asInt(daysRaw, 1, state.dayCount);
      state.dayCount = Math.max(1, Math.min(730, d));
      state.endPreset = 'custom';
      render();
    },
    fitViewToCards: () => {
      const rows = Array.isArray(state.cards) ? state.cards : [];
      if (!rows.length) return;
      let minStart = null;
      let maxEnd = null;
      rows.forEach((c) => {
        const s = parseDateLoose(c.startDate);
        const e = parseDateLoose(c.endDate || c.startDate);
        if (!s || !e) return;
        if (!minStart || s.getTime() < minStart.getTime()) minStart = s;
        if (!maxEnd || e.getTime() > maxEnd.getTime()) maxEnd = e;
      });
      if (!minStart || !maxEnd) return;
      state.startDate = minStart;
      state.dayCount = Math.max(1, dayDiff(maxEnd, minStart) + 1);
      render();
    },
    applyView: () => {
      const s = parseDateLoose(els.inpStart && els.inpStart.value);
      const e = parseDateLoose(els.inpEnd && els.inpEnd.value);
      const d = asInt(els.inpDays && els.inpDays.value, 1, state.dayCount);
      const startBase = s || state.startDate;
      if (s) state.startDate = s;
      if (e && startBase) state.dayCount = Math.max(1, dayDiff(e, startBase) + 1);
      else state.dayCount = Math.max(1, Math.min(730, d));
      state.startPreset = 'custom';
      state.endPreset = 'custom';
      render();
    },
    saveView: () => {
      const visMap = {};
      state.lanes.forEach((l) => { visMap[norm(l.id)] = state.laneVisibility[norm(l.id)] !== false; });
      visMap[ASSETS_LANE_ID] = !!state.assetLaneVisible;
      const meta = Object.assign({}, state.viewMeta || {}, {
        startDate: toYmd(state.startDate),
        dayCount: state.dayCount,
        endDate: toYmd(addDays(state.startDate, Math.max(0, state.dayCount - 1))),
        startPreset: normalizePresetKey_(state.startPreset),
        endPreset: normalizePresetKey_(state.endPreset),
        autoPush: !!state.autoPush,
        autoCellHeight: !!state.autoCellHeight,
        laneVisibility: visMap,
        laneWidth: state.laneWidth,
        assetLaneWidth: state.assetLaneWidth,
        taskDisplayMain: normalizeDisplayField(state.taskDisplayMain, 'shot_code'),
        taskDisplaySub: normalizeDisplayField(state.taskDisplaySub, 'task_name'),
        tasklessDisplayMain: normalizeDisplayField(state.tasklessDisplayMain, 'card_memo'),
        tasklessDisplaySub: normalizeDisplayField(state.tasklessDisplaySub, 'card_order'),
        customDisplayFields: (state.customDisplayFields || [])
          .map((v) => normalizeDisplayField(v, ''))
          .filter((v) => /^task:|^taskless:|^asset:/i.test(String(v || ''))),
        viewMode: 'lite',
        liteZoomPx: state.dayPx
      });
      status('saving', 'Saving view...');
      google.script.run
        .withSuccessHandler(() => { status('saved', 'View saved'); })
        .withFailureHandler((err) => { status('error', String(err && (err.message || err) || 'View save failed')); })
        .sv_scheduler_save_meta_v2(JSON.stringify({ schedId: state.schedId, type: 'view_meta', value: meta }));
    },
    saveSettings: () => actions.saveView(),
    saveLane: () => actions.saveView(),
    setTaskDisplayField: (slotType, fieldKey) => {
      const slot = norm(slotType);
      const fallback = slot === 'main'
        ? 'shot_code'
        : (slot === 'sub'
          ? 'task_name'
          : (slot === 'taskless_main' ? 'card_memo' : 'card_order'));
      const normalized = normalizeDisplayField(fieldKey, fallback);
      if (slot === 'main') state.taskDisplayMain = normalized;
      else if (slot === 'sub') state.taskDisplaySub = normalized;
      else if (slot === 'taskless_main') state.tasklessDisplayMain = normalized;
      else if (slot === 'taskless_sub') state.tasklessDisplaySub = normalized;
      render();
    },
    addDisplayField: () => {
      const addSel = els.selDispAddField;
      const targetSel = els.selDispAddTarget;
      if (!addSel || !targetSel) return;
      const normalized = normalizeDisplayField(addSel.value, '');
      if (!normalized) return;
      if (
        DISPLAY_BASE_FIELDS.indexOf(normalized) < 0 &&
        !/^task:|^taskless:|^asset:/i.test(normalized)
      ) return;
      if (DISPLAY_BASE_FIELDS.indexOf(normalized) < 0 && !state.customDisplayFields.some((v) => norm(v) === normalized)) {
        state.customDisplayFields.push(normalized);
      }
      actions.setTaskDisplayField(targetSel.value, normalized);
      syncDisplaySelectors_();
    },
    patchTaskField: (taskId, def, nextValue) => {
      const tid = norm(taskId);
      const fid = norm(def && def.fid);
      if (!tid || !fid) return;
      const task = getTaskById(tid);
      if (!task) return;
      const prevTaskFields = Object.assign({}, task.fields || {});
      const prevTaskStatus = String(task.status || '');
      const prevTaskAssignee = String(task.assignee || '');
      const prevTaskPlanStart = String(task.planStart || '');
      const prevTaskPlanEnd = String(task.planEnd || '');
      const prevTaskOrder = String(task.taskOrder || '');
      const prevCards = state.cards
        .filter((c) => c && c.type === 'task' && norm(c.taskId) === tid)
        .map((c) => ({
          id: c.id,
          laneId: c.laneId,
          status: c.status,
          taskOrder: c.taskOrder,
          displayOrder: c.displayOrder,
          startDate: cloneDateOrNull_(c.startDate),
          endDate: cloneDateOrNull_(c.endDate),
          startDateYmd: c.startDateYmd,
          endDateYmd: c.endDateYmd
        }));
      const patch = {};
      const type = lower(def && def.type);
      if (type === 'checkbox') patch[fid] = !!nextValue;
      else patch[fid] = (nextValue === null || nextValue === undefined) ? '' : String(nextValue);
      applyTaskFieldLocal_(tid, def, patch[fid]);
      render();
      status('saving', `Saving ${def.label || fid}...`);
      google.script.run
        .withSuccessHandler((res) => {
          const ok = !!(res && res.ok);
          if (!ok) {
            status('error', String((res && (res.error || res.note)) || 'Task save failed'));
            task.fields = prevTaskFields;
            task.status = prevTaskStatus;
            task.assignee = prevTaskAssignee;
            task.planStart = prevTaskPlanStart;
            task.planEnd = prevTaskPlanEnd;
            task.taskOrder = prevTaskOrder;
            prevCards.forEach((p) => {
              const c = tokenById(p.id);
              if (!c) return;
              c.laneId = p.laneId;
              c.status = p.status;
              c.taskOrder = p.taskOrder;
              c.displayOrder = p.displayOrder;
              c.startDate = cloneDateOrNull_(p.startDate);
              c.endDate = cloneDateOrNull_(p.endDate);
              c.startDateYmd = p.startDateYmd;
              c.endDateYmd = p.endDateYmd;
            });
            render();
            return;
          }
          status('saved', 'Task saved');
          renderInspector();
        })
        .withFailureHandler((err) => {
          task.fields = prevTaskFields;
          task.status = prevTaskStatus;
          task.assignee = prevTaskAssignee;
          task.planStart = prevTaskPlanStart;
          task.planEnd = prevTaskPlanEnd;
          task.taskOrder = prevTaskOrder;
          prevCards.forEach((p) => {
            const c = tokenById(p.id);
            if (!c) return;
            c.laneId = p.laneId;
            c.status = p.status;
            c.taskOrder = p.taskOrder;
            c.displayOrder = p.displayOrder;
            c.startDate = cloneDateOrNull_(p.startDate);
            c.endDate = cloneDateOrNull_(p.endDate);
            c.startDateYmd = p.startDateYmd;
            c.endDateYmd = p.endDateYmd;
          });
          render();
          status('error', String(err && (err.message || err) || 'Task save failed'));
        })
        .sv_setRecord_v2('task', tid, patch, { actor: 'schedview_inspector' });
    },
    openEdit: () => {
      const base = norm(state.scriptUrl || (location.origin + location.pathname)).replace(/\?.*$/, '');
      const sid = encodeURIComponent(norm(state.schedId || ''));
      (window.top || window).location.href = `${base}?p=schedule&schedId=${sid}`;
    },
    openSettings: () => setSettingsModalOpen_(true),
    closeSettings: () => setSettingsModalOpen_(false),
    setLaneWidth: (v) => {
      applyLaneWidth_(v);
      render();
    },
    setAssetLaneWidth: (v) => {
      applyAssetLaneWidth_(v);
      render();
    },
    setAutoCellHeight: (on) => {
      state.autoCellHeight = !!on;
      render();
    },
    setZoomFromSlider: (v) => {
      applyDayPx_(v);
      render();
    },
    setZoomFromInput: (v) => {
      applyDayPx_(v);
      render();
    }
  };

  const bind = () => {
    if (els.schedSwitch) els.schedSwitch.addEventListener('change', (e) => actions.switchSched(e.target.value));
    const btnEdit = document.getElementById('btn-edit');
    if (btnEdit) btnEdit.addEventListener('click', actions.openEdit);
    const btnSettings = document.getElementById('btn-settings');
    if (btnSettings) btnSettings.addEventListener('click', actions.openSettings);
    const btnSettingsClose = document.getElementById('btn-settings-close');
    if (btnSettingsClose) btnSettingsClose.addEventListener('click', actions.closeSettings);
    if (els.inpStartPreset) els.inpStartPreset.addEventListener('change', (e) => actions.setStartPreset(e.target.value));
    if (els.inpEndPreset) els.inpEndPreset.addEventListener('change', (e) => actions.setEndPreset(e.target.value));
    if (els.inpRange) els.inpRange.addEventListener('change', (e) => {
      const val = norm(e && e.target ? e.target.value : '');
      if (!val || val === 'custom') return;
      actions.setDuration(val);
    });
    if (els.chkPush) els.chkPush.addEventListener('change', (e) => { state.autoPush = !!(e && e.target && e.target.checked); });
    if (els.chkAutoHeight) els.chkAutoHeight.addEventListener('change', (e) => actions.setAutoCellHeight(!!(e && e.target && e.target.checked)));
    if (els.inpLaneW) els.inpLaneW.addEventListener('change', (e) => actions.setLaneWidth(e.target.value));
    if (els.inpAssetLaneW) els.inpAssetLaneW.addEventListener('change', (e) => actions.setAssetLaneWidth(e.target.value));
    if (els.selDispMain) els.selDispMain.addEventListener('change', (e) => actions.setTaskDisplayField('main', e.target.value));
    if (els.selDispSub) els.selDispSub.addEventListener('change', (e) => actions.setTaskDisplayField('sub', e.target.value));
    if (els.selDispTasklessMain) els.selDispTasklessMain.addEventListener('change', (e) => actions.setTaskDisplayField('taskless_main', e.target.value));
    if (els.selDispTasklessSub) els.selDispTasklessSub.addEventListener('change', (e) => actions.setTaskDisplayField('taskless_sub', e.target.value));
    if (els.btnDispAddField) els.btnDispAddField.addEventListener('click', actions.addDisplayField);
    if (els.inpStart) els.inpStart.addEventListener('change', () => {
      const d = parseDateLoose(els.inpStart.value);
      if (!d) return;
      state.startDate = d;
      state.startPreset = 'custom';
      render();
    });
    if (els.inpEnd) els.inpEnd.addEventListener('change', () => {
      const d = parseDateLoose(els.inpEnd.value);
      if (!d) return;
      const diff = dayDiff(d, state.startDate) + 1;
      state.dayCount = Math.max(1, Math.min(730, diff));
      state.endPreset = 'custom';
      render();
    });
    const btnViewApply = document.getElementById('btn-view-apply');
    if (btnViewApply) btnViewApply.addEventListener('click', actions.applyView);
    const btnViewFit = document.getElementById('btn-view-fit');
    if (btnViewFit) btnViewFit.addEventListener('click', actions.fitViewToCards);
    const btnViewSave = document.getElementById('btn-view-save');
    if (btnViewSave) btnViewSave.addEventListener('click', actions.saveView);
    const btnLaneSave = document.getElementById('btn-lane-save');
    if (btnLaneSave) btnLaneSave.addEventListener('click', actions.saveLane);
    const btnSettingsSave = document.getElementById('btn-settings-save');
    if (btnSettingsSave) btnSettingsSave.addEventListener('click', actions.saveSettings);
    if (els.inpZoom) els.inpZoom.addEventListener('input', (e) => actions.setZoomFromSlider(e.target.value));
    if (els.inpZoomVal) els.inpZoomVal.addEventListener('change', (e) => actions.setZoomFromInput(e.target.value));
    if (els.gridScroll && els.laneHeaderScroll) {
      els.gridScroll.addEventListener('scroll', () => { els.laneHeaderScroll.scrollLeft = els.gridScroll.scrollLeft; });
    }
    if (els.settingsModal) {
      els.settingsModal.addEventListener('click', (e) => {
        if (e.target === els.settingsModal) actions.closeSettings();
      });
    }
    if (els.canvas) {
      els.canvas.addEventListener('click', (e) => {
        if (e.target === els.canvas) {
          state.selectionTokenId = '';
          renderInspector();
        }
      });
    }
  };

  return { bind, actions };
})();

document.addEventListener('DOMContentLoaded', () => {
  window.app.bind();
  window.app.actions.load();
});
</script>
</body>
</html>
